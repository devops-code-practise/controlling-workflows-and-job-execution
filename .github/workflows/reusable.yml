name: Reusable Deploy
# now it can be called inside other workflows
on:
  workflow_call:
    inputs:
      artifact-name:
        description: The name of the deployable artifact files
        required: false
        default: dist
        type: string
    # secrets:
    #   some-secret:
    #     required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      # USING SECRETS
      # - name: Use the secret
      #   run: echo "My secret token is ${{ secrets.some-secret }}"
      - name: List files
        run: ls
      - name: Output information
        run: echo "Deploying and uploading..."
